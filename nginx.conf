server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Cache images shorter (photos change monthly)
    location ~* /lectures/.*\.(jpg|jpeg|png|gif)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # JSON no-cache (data.json changes per lecture)
    location ~* \.json$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
